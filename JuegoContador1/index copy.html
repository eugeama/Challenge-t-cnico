<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JuegoContador</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      body {
        margin: 0;
        font-family: sans-serif;
        background: #f4f4f4;
        color: #222;
      }

      main {
        max-width: 480px;
        margin: 40px auto;
        padding: 20px;
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 8px;
      }

      h1 {
        margin-top: 0;
      }

      button {
        padding: 8px 14px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const DURACION_JUEGO_SEGUNDOS = 5;
      const MENSAJES_CUENTA_ATRAS = ["Preparados", "Listos", "Ya"];
      const CLAVE_MEJOR_RACHA = "juego-contador-mejor-racha";

      function JuegoContador() {
        const [estado, setEstado] = React.useState("inicial");
        const [contador, setContador] = React.useState(0);
        const [tiempoRestante, setTiempoRestante] = React.useState(DURACION_JUEGO_SEGUNDOS);
        const [mensajeCuentaAtras, setMensajeCuentaAtras] = React.useState("");
        const [mejorRacha, setMejorRacha] = React.useState(0);

        const intervalRef = React.useRef(null);
        const contadorRef = React.useRef(0);

        const limpiarIntervalo = () => {
          if (intervalRef.current !== null) {
            window.clearInterval(intervalRef.current);
            intervalRef.current = null;
          }
        };

        React.useEffect(() => {
          const valorGuardado = localStorage.getItem(CLAVE_MEJOR_RACHA);
          if (!valorGuardado) {
            return;
          }

          const rachaParseada = Number.parseInt(valorGuardado, 10);
          if (!Number.isNaN(rachaParseada) && rachaParseada >= 0) {
            setMejorRacha(rachaParseada);
          }
        }, []);

        React.useEffect(() => {
          return () => {
            limpiarIntervalo();
          };
        }, []);

        const finalizarJuego = () => {
          const clicksFinales = contadorRef.current;

          setEstado("finalizado");
          setTiempoRestante(0);

          setMejorRacha((rachaActual) => {
            const nuevaRacha = Math.max(rachaActual, clicksFinales);
            if (nuevaRacha !== rachaActual) {
              localStorage.setItem(CLAVE_MEJOR_RACHA, String(nuevaRacha));
            }
            return nuevaRacha;
          });
        };

        const iniciarJuego = () => {
          setEstado("jugando");
          setMensajeCuentaAtras("");
          setTiempoRestante(DURACION_JUEGO_SEGUNDOS);

          limpiarIntervalo();
          intervalRef.current = window.setInterval(() => {
            setTiempoRestante((tiempoActual) => {
              if (tiempoActual <= 1) {
                limpiarIntervalo();
                finalizarJuego();
                return 0;
              }
              return tiempoActual - 1;
            });
          }, 1000);
        };

        const iniciarPartida = () => {
          limpiarIntervalo();

          setEstado("cuentaAtras");
          setContador(0);
          contadorRef.current = 0;
          setTiempoRestante(DURACION_JUEGO_SEGUNDOS);
          setMensajeCuentaAtras(MENSAJES_CUENTA_ATRAS[0]);

          let indiceMensaje = 0;

          intervalRef.current = window.setInterval(() => {
            indiceMensaje += 1;
            if (indiceMensaje < MENSAJES_CUENTA_ATRAS.length) {
              setMensajeCuentaAtras(MENSAJES_CUENTA_ATRAS[indiceMensaje]);
              return;
            }

            limpiarIntervalo();
            iniciarJuego();
          }, 1000);
        };

        const incrementarContador = () => {
          if (estado !== "jugando") {
            return;
          }

          setContador((valorActual) => {
            const nuevoValor = valorActual + 1;
            contadorRef.current = nuevoValor;
            return nuevoValor;
          });
        };

        return (
          <main>
            <h1>JuegoContador</h1>

            <p>Tiempo restante: {tiempoRestante} segundos</p>

            {estado === "inicial" && (
              <button type="button" onClick={iniciarPartida}>
                Empezar
              </button>
            )}

            {estado === "cuentaAtras" && <p>{mensajeCuentaAtras}</p>}

            {estado === "jugando" && (
              <section>
                <p>Contador: {contador}</p>
                <button type="button" onClick={incrementarContador}>
                  Clickear
                </button>
              </section>
            )}

            {estado === "finalizado" && (
              <section>
                <p>Clicks realizados: {contador}</p>
                <p>Mejor racha: {mejorRacha}</p>
                <button type="button" onClick={iniciarPartida}>
                  Empezar
                </button>
              </section>
            )}
          </main>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<JuegoContador />);
    </script>
  </body>
</html>
